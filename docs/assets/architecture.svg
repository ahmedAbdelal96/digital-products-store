<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">Architecture Overview</text>

  <!-- Client Browser -->
  <rect x="300" y="60" width="200" height="80" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="90" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Client Browser</text>
  <text x="400" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Next.js App (App Router)</text>

  <!-- Arrows down from browser -->
  <path d="M400 140 L400 170" stroke="#1376f4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M300 150 L180 190" stroke="#1376f4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M500 150 L620 190" stroke="#1376f4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1376f4"/>
    </marker>
  </defs>

  <!-- Next.js App -->
  <rect x="300" y="170" width="200" height="60" rx="8" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Next.js Application</text>
  <text x="400" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Server Components + API Routes</text>

  <!-- Supabase Auth -->
  <rect x="40" y="200" width="160" height="80" rx="8" fill="#3ECF8E" stroke="#3ECF8E" stroke-width="2"/>
  <text x="120" y="230" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Supabase Auth</text>
  <text x="120" y="250" font-family="system-ui, sans-serif" font-size="10" fill="#ecfdf5" text-anchor="middle">User Authentication</text>
  <text x="120" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#ecfdf5" text-anchor="middle">Session Management</text>

  <!-- Supabase Database -->
  <rect x="620" y="200" width="160" height="80" rx="8" fill="#3ECF8E" stroke="#3ECF8E" stroke-width="2"/>
  <text x="700" y="230" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Supabase DB</text>
  <text x="700" y="250" font-family="system-ui, sans-serif" font-size="10" fill="#ecfdf5" text-anchor="middle">PostgreSQL</text>
  <text x="700" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#ecfdf5" text-anchor="middle">RLS Policies</text>

  <!-- Labels -->
  <text x="220" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#1376f4" text-anchor="middle">Auth</text>
  <text x="580" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#1376f4" text-anchor="middle">Data</text>

  <!-- Storefront / Admin boxes -->
  <rect x="120" y="300" width="140" height="50" rx="8" fill="#1376f4"/>
  <text x="190" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Storefront</text>

  <rect x="540" y="300" width="140" height="50" rx="8" fill="#f42c37"/>
  <text x="610" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Admin Dashboard</text>

  <!-- Arrows to bottom boxes -->
  <path d="M400 230 L400 300" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
  <path d="M400 230 L190 300" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
  <path d="M400 230 L610 300" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4"/>

  <!-- Legend -->
  <text x="400" y="385" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    Client → Next.js → Supabase (Auth/Database) → Storefront / Admin Dashboard
  </text>
</svg>
